<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy MPM — Full System Audit Checklist</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --critical:#ef4444;--critical-bg:rgba(239,68,68,.12);
  --high:#f59e0b;--high-bg:rgba(245,158,11,.12);
  --medium:#3b82f6;--medium-bg:rgba(59,130,246,.12);
  --low:#22c55e;--low-bg:rgba(34,197,94,.12);
  --info:#8b5cf6;--info-bg:rgba(139,92,246,.12);
  --done:#10b981;--done-bg:rgba(16,185,129,.15);
  --accent:#6366f1;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:24px 16px 80px}
header{text-align:center;padding:32px 0 12px}
header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text2);font-size:14px;margin-top:6px}
.updated{color:var(--text3);font-size:11px;margin-top:4px}

.stats-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;min-width:100px;flex:1;max-width:160px;transition:transform .2s}
.stat:hover{transform:translateY(-2px)}
.stat .num{font-size:24px;font-weight:800}
.stat .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat.critical .num{color:var(--critical)}
.stat.high .num{color:var(--high)}
.stat.medium .num{color:var(--medium)}
.stat.low .num{color:var(--low)}
.stat.info .num{color:var(--info)}
.stat.done .num{color:var(--done)}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters input[type=text]{flex:1;min-width:200px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.filters input[type=text]:focus{border-color:var(--accent)}
.filters input[type=text]::placeholder{color:var(--text3)}
.fbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;transition:all .2s}
.fbtn:hover,.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.progress-bar{width:100%;height:8px;background:var(--surface2);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--done),#34d399);border-radius:4px;transition:width .5s ease}

.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;cursor:pointer;user-select:none;transition:background .2s}
.section-header:hover{background:var(--surface2)}
.section-header .arrow{transition:transform .3s;color:var(--text3);font-size:12px}
.section-header.open .arrow{transform:rotate(90deg)}
.section-header h2{font-size:14px;font-weight:700;flex:1}
.section-header .badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-critical{background:var(--critical-bg);color:var(--critical)}
.badge-high{background:var(--high-bg);color:var(--high)}
.badge-medium{background:var(--medium-bg);color:var(--medium)}
.badge-low{background:var(--low-bg);color:var(--low)}
.badge-info{background:var(--info-bg);color:var(--info)}
.section-count{font-size:11px;color:var(--text3);font-weight:600}

.items{border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.items.collapsed{display:none}

.item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(71,85,105,.3);transition:background .15s;font-size:13px}
.item:last-child{border-bottom:none}
.item:hover{background:rgba(99,102,241,.06)}
.item.done{opacity:.45}
.item.done .item-title{text-decoration:line-through}

.item input[type=checkbox]{width:18px;height:18px;accent-color:var(--done);cursor:pointer;flex-shrink:0;margin-top:1px}

.item-content{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;margin-bottom:2px}
.item-detail{font-size:11px;color:var(--text2);line-height:1.5}
.item-file{font-family:'Cascadia Code','Fira Code',monospace;font-size:10px;color:var(--accent);background:rgba(99,102,241,.12);padding:1px 5px;border-radius:3px;display:inline-block;margin-top:3px}

.item-severity{flex-shrink:0;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.sev-critical{background:var(--critical-bg);color:var(--critical)}
.sev-high{background:var(--high-bg);color:var(--high)}
.sev-medium{background:var(--medium-bg);color:var(--medium)}
.sev-low{background:var(--low-bg);color:var(--low)}
.sev-info{background:var(--info-bg);color:var(--info)}

.export-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 24px;display:flex;justify-content:center;gap:10px;z-index:99}
.export-btn{padding:9px 18px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.export-btn.primary{background:var(--accent);color:#fff}
.export-btn.primary:hover{background:#4f46e5}
.export-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.export-btn.secondary:hover{background:var(--surface2)}

@media(max-width:640px){
  .stats-bar{gap:6px}.stat{min-width:70px;padding:8px 10px}.stat .num{font-size:18px}
  .filters{flex-direction:column}.filters input[type=text]{min-width:100%}
  header h1{font-size:20px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <h1>Happy MPM — Full System Audit Checklist</h1>
    <p>ตรวจสอบครบทุกหน้า ทุก Section ทุกระบบ — ติ๊กเมื่อแก้ไขเสร็จ (บันทึกอัตโนมัติ)</p>
    <div class="updated">อัปเดตล่าสุด: 6 มีนาคม 2026 — รวม 106 รายการ (เพิ่ม Production + AI Chat + Live Preview issues)</div>
  </header>
  <div class="stats-bar" id="stats"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="filters" id="filters"></div>
  <div id="sections"></div>
</div>
<div class="export-bar">
  <button class="export-btn secondary" onclick="resetAll()">รีเซ็ตทั้งหมด</button>
  <button class="export-btn secondary" onclick="exportJSON()">Export JSON</button>
  <button class="export-btn primary" onclick="exportMarkdown()">Export Markdown</button>
</div>

<script>

const STORAGE_KEY = 'happympm_audit_v2';
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
let state=loadState(),filterSev='all',filterSearch='',collapsed={};

function allItems(){return DATA.flatMap(s=>s.items)}
function vis(i){
  if(filterSev!=='all'&&i.severity!==filterSev)return false;
  if(filterSearch){const q=filterSearch.toLowerCase();return i.title.toLowerCase().includes(q)||i.detail.toLowerCase().includes(q)||i.file.toLowerCase().includes(q)}
  return true;
}

function render(){
  const all=allItems(),total=all.length,done=all.filter(i=>state[i.id]).length,pct=total?Math.round(done/total*100):0;
  const actionable=all.filter(i=>i.severity!=='info');
  const actionDone=actionable.filter(i=>state[i.id]).length;
  const actionPct=actionable.length?Math.round(actionDone/actionable.length*100):0;

  document.getElementById('stats').innerHTML=`
    <div class="stat done"><div class="num">${actionDone}/${actionable.length}</div><div class="label">แก้ไขแล้ว (${actionPct}%)</div></div>
    <div class="stat critical"><div class="num">${all.filter(i=>i.severity==='critical'&&!state[i.id]).length}</div><div class="label">Critical</div></div>
    <div class="stat high"><div class="num">${all.filter(i=>i.severity==='high'&&!state[i.id]).length}</div><div class="label">High</div></div>
    <div class="stat medium"><div class="num">${all.filter(i=>i.severity==='medium'&&!state[i.id]).length}</div><div class="label">Medium</div></div>
    <div class="stat low"><div class="num">${all.filter(i=>i.severity==='low'&&!state[i.id]).length}</div><div class="label">Low</div></div>
    <div class="stat info"><div class="num">${all.filter(i=>i.severity==='info').length}</div><div class="label">Info/Status</div></div>
  `;
  document.getElementById('progress').style.width=actionPct+'%';
  document.getElementById('filters').innerHTML=`
    <input type="text" placeholder="🔍 ค้นหา..." value="${filterSearch}" oninput="filterSearch=this.value;render()">
    ${['all','critical','high','medium','low','info'].map(s=>`<button class="fbtn ${filterSev===s?'active':''}" onclick="filterSev='${s}';render()">${s==='all'?'ทั้งหมด':s.toUpperCase()}</button>`).join('')}
  `;
  let html='';
  DATA.forEach(sec=>{
    const v=sec.items.filter(vis);if(!v.length)return;
    const d=v.filter(i=>state[i.id]).length,isOpen=!collapsed[sec.id];
    html+=`<div class="section">
      <div class="section-header ${isOpen?'open':''}" onclick="collapsed['${sec.id}']=!collapsed['${sec.id}'];render()">
        <span class="arrow">▶</span><h2>${sec.title}</h2>
        <span class="section-count">${d}/${v.length}</span>
        <span class="badge badge-${sec.severity}">${v.length} รายการ</span>
      </div>
      <div class="items ${isOpen?'':'collapsed'}">
        ${v.map(i=>`<div class="item ${state[i.id]?'done':''}">
          <input type="checkbox" ${state[i.id]?'checked':''} onchange="toggle('${i.id}')">
          <div class="item-content">
            <div class="item-title">${i.title}</div>
            <div class="item-detail">${i.detail}</div>
            <span class="item-file">${i.file}</span>
          </div>
          <span class="item-severity sev-${i.severity}">${i.severity}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('sections').innerHTML=html;
}

function toggle(id){state[id]=!state[id];saveState(state);render()}
function resetAll(){if(!confirm('รีเซ็ตทั้งหมด?')){return}state={};saveState(state);render()}
function exportJSON(){
  const d=allItems().map(i=>({id:i.id,title:i.title,severity:i.severity,done:!!state[i.id],file:i.file}));
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='audit-checklist.json';a.click();
}
function exportMarkdown(){
  let md='# Happy MPM Full System Audit\n\n';
  DATA.forEach(s=>{md+=`## ${s.title}\n\n`;s.items.forEach(i=>{md+=`- [${state[i.id]?'x':' '}] **${i.title}** (${i.severity.toUpperCase()})\n  - ${i.detail}\n  - \`${i.file}\`\n\n`})});
  const b=new Blob([md],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='audit-checklist.md';a.click();
}
render();
</script>
